services:
  postgres:
    image: postgres:16-alpine
    container_name: anon-inbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anon
      POSTGRES_PASSWORD: anon_dev_pass
      POSTGRES_DB: anon_inbox
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U anon -d anon_inbox']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: anon-inbox-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
